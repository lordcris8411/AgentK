<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <script>
      try {
        const cached = JSON.parse(localStorage.getItem("agent-k-settings") || "{}");
        const systemDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        document.documentElement.dataset.theme = cached.theme === "dark" ||
          (cached.theme === "system" && systemDark) ? "dark" : "light";
      } catch {
        document.documentElement.dataset.theme = window.matchMedia("(prefers-color-scheme: dark)").matches
          ? "dark"
          : "light";
      }
    </script>
    <style>
      * { box-sizing: border-box; }
      :root {
        --surface-raised: #fbfaf8;
        --border: #e8e3dd;
        --text: #292725;
        --muted: #928b83;
        --mark-bg: #252525;
        --mark-fg: #fff;
        --track: #e9e4de;
        --progress: #77716a;
        --spinner: #ddd7d1;
        --spinner-active: #34302d;
        color-scheme: light;
      }
      :root[data-theme="dark"] {
        --surface-raised: #2c2b29;
        --border: #3b3936;
        --text: #ece9e4;
        --muted: #8d8780;
        --mark-bg: #f0ede8;
        --mark-fg: #2c2b29;
        --track: #403d39;
        --progress: #b9b3ac;
        --spinner: #4b4844;
        --spinner-active: #ece9e4;
        color-scheme: dark;
      }
      html, body { background: transparent; }
      body { align-items: center; color: var(--text); display: flex; font-family: "Segoe UI Variable", "Microsoft YaHei UI", sans-serif; height: 100vh; justify-content: center; margin: 0; }
      main { align-items: center; background: var(--surface-raised); border: 1px solid var(--border); border-radius: 16px; box-shadow: 0 12px 32px rgb(0 0 0 / 18%); display: flex; gap: 18px; min-height: 122px; padding: 24px 26px; width: 348px; }
      .mark { align-items: center; background: var(--mark-bg); border-radius: 11px; color: var(--mark-fg); display: flex; flex: 0 0 auto; font-family: Georgia, serif; font-size: 27px; font-weight: 700; height: 52px; justify-content: center; width: 52px; }
      main div { flex: 1; min-width: 0; }
      strong { display: block; font-size: 17px; letter-spacing: -.02em; line-height: 1.3; }
      p { color: var(--muted); font-size: 12px; line-height: 1.55; margin: 7px 0 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .track { background: var(--track); border-radius: 999px; height: 3px; margin-top: 10px; overflow: hidden; width: 100%; }
      .progress { background: var(--progress); border-radius: inherit; display: block; height: 100%; transition: width 180ms ease; width: 0; }
      i { animation: spin .8s linear infinite; border: 2px solid var(--spinner); border-radius: 50%; border-right-color: var(--spinner-active); flex: 0 0 auto; height: 17px; margin-left: 4px; width: 17px; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body><main><span class="mark">K</span><div><strong>Agent K</strong><p id="status">正在读取会话…</p><section class="track"><span class="progress" id="progress"></span></section></div><i></i></main></body>
</html>
